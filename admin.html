<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GestãoOS — Painel Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--accent:#7c3aed;--accent-dark:#6d28d9;--accent-light:#f5f3ff;--accent-text:#5b21b6;
--bg:#F8F9FA;--surface:#fff;--border:#E5E7EB;--border-dark:#D1D5DB;
--text:#111827;--text-2:#6B7280;--text-3:#9CA3AF;
--green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;
--amber:#d97706;--amber-bg:#fffbeb;--blue:#2563EB;--blue-bg:#eff6ff;
--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);
--radius:8px;--radius-lg:12px;--radius-xl:16px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border-dark);border-radius:4px}
/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:#1e1b4b;display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:12px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:1.5rem}
/* SIDEBAR */
.sb-brand{padding:1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.sb-icon i{color:#fff;font-size:18px}
.sb-title{font-size:15px;font-weight:700;color:#fff}
.sb-sub{font-size:11px;color:rgba(255,255,255,.4)}
.sb-nav{padding:.75rem .5rem;flex:1}
.sb-group{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.3);padding:.5rem .5rem .25rem;margin-top:.25rem}
.sb-link{display:flex;align-items:center;gap:9px;padding:.5rem .75rem;border-radius:6px;color:rgba(255,255,255,.6);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:13px;font-family:'Inter',sans-serif;transition:all .12s}
.sb-link i{font-size:17px;opacity:.7}
.sb-link:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-link:hover i{opacity:1}
.sb-link.active{background:rgba(255,255,255,.12);color:#fff;font-weight:500}
.sb-link.active i{opacity:1}
.sb-badge{margin-left:auto;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.sb-footer{padding:.75rem 1rem;border-top:1px solid rgba(255,255,255,.08);margin-top:auto}
.sb-user{display:flex;align-items:center;gap:9px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.sb-uname{font-size:12px;font-weight:500;color:rgba(255,255,255,.9)}
.sb-urole{font-size:11px;color:rgba(255,255,255,.4)}
/* TOPBAR */
.tb-title{font-size:16px;font-weight:600}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.375rem .75rem;width:220px}
.tb-search input{border:none;background:none;font-size:13px;width:100%;outline:none;font-family:'Inter',sans-serif;color:var(--text)}
.tb-search i{color:var(--text-3);font-size:16px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:.45rem 1rem;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .12s;white-space:nowrap}
.btn i{font-size:15px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border-dark)}.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.btn-ghost{background:transparent;color:var(--text-2);padding:.35rem .6rem}.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:.3rem .65rem;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:600}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.mb-3{margin-bottom:1.5rem}
/* METRICS */
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;box-shadow:var(--shadow)}
.metric-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem}
.metric-label{font-size:12px;color:var(--text-2);font-weight:500}
.metric-icon{width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.metric-icon i{font-size:17px}
.metric-value{font-size:24px;font-weight:700;letter-spacing:-.5px}
.metric-delta{font-size:11px;margin-top:5px;color:var(--text-3)}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-purple{background:var(--accent-light);color:var(--accent-text)}
.badge-gray{background:#F3F4F6;color:#4B5563}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:.5rem .875rem;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:.7rem .875rem;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg)}
.td-actions{display:flex;align-items:center;gap:4px;justify-content:flex-end}
/* FORMS */
.form-label{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:.5rem .75rem;border:1px solid var(--border-dark);border-radius:var(--radius);font-size:13px;font-family:'Inter',sans-serif;color:var(--text);background:var(--surface);outline:none;transition:border-color .12s;appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:760px}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-body{padding:1.5rem;overflow-y:auto;flex:1}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
/* TOAST */
#toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:.65rem 1rem;border-radius:var(--radius-lg);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);animation:slideIn .2s ease;min-width:220px}
.toast-success{background:#111827;color:#fff}.toast-error{background:#dc2626;color:#fff}
.toast-warning{background:#d97706;color:#fff}.toast-info{background:var(--accent);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{to{transform:translateX(110%);opacity:0}}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);padding:1rem}
.login-box{background:var(--surface);border-radius:var(--radius-xl);padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.login-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center}
.login-icon i{font-size:24px;color:#fff}
.login-title{font-size:20px;font-weight:700}
.login-sub{font-size:13px;color:var(--text-2);margin-top:2px}
.login-label{font-size:12px;font-weight:600;margin-bottom:6px;display:block;color:var(--text)}
/* STAT ROW */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
/* AVATAR */
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
/* PROGRESS */
.progress{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
/* MISC */
.flex-between{display:flex;align-items:center;justify-content:space-between}
.fw5{font-weight:500}.fw6{font-weight:600}
.text-2{color:var(--text-2)}.text-3{color:var(--text-3)}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.nowrap{white-space:nowrap}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}
.spin{animation:spinAnim 1s linear infinite}
@keyframes spinAnim{to{transform:rotate(360deg)}}
.empty{padding:3rem;text-align:center;color:var(--text-2)}
.empty i{font-size:36px;color:var(--border-dark);margin-bottom:.75rem;display:block}
.empty-title{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text)}
/* STATUS DOT */
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot-green{background:#22c55e}.dot-red{background:#ef4444}.dot-amber{background:#f59e0b}.dot-gray{background:#9ca3af}
/* PLAN CARD */
.plan-card{border:2px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;cursor:pointer;transition:all .15s;position:relative}
.plan-card:hover{border-color:var(--accent)}
.plan-card.selected{border-color:var(--accent);background:var(--accent-light)}
.plan-badge{position:absolute;top:-10px;right:12px;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;background:var(--accent);color:#fff}
/* TIMELINE */
.timeline{padding-left:1.5rem;border-left:2px solid var(--border)}
.timeline-item{position:relative;padding-bottom:1rem;padding-left:1rem}
.timeline-item::before{content:'';position:absolute;left:-1.3rem;top:4px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.timeline-date{font-size:11px;color:var(--text-3);margin-bottom:3px}
.timeline-text{font-size:13px;font-weight:500}
/* CHART */
.chart-wrap{position:relative;height:200px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-icon"><i class="ti ti-building-store"></i></div>
      <div>
        <div class="login-title">GestãoOS Admin</div>
        <div class="login-sub">Painel do administrador</div>
      </div>
    </div>
    <div id="loginError" style="display:none;background:var(--red-bg);color:var(--red);padding:.75rem 1rem;border-radius:var(--radius);font-size:13px;margin-bottom:1rem;"></div>
    <div class="form-group mb-2">
      <label class="login-label">E-mail</label>
      <input type="email" id="loginEmail" class="form-input" placeholder="admin@gestao.os" autocomplete="email"/>
    </div>
    <div class="form-group" style="margin-bottom:1.5rem">
      <label class="login-label">Senha</label>
      <input type="password" id="loginPass" class="form-input" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:.65rem" id="loginBtn" onclick="doLogin()">
      <i class="ti ti-lock"></i> Entrar no painel
    </button>
    <div id="loginDemoNote" style="text-align:center;margin-top:1rem;font-size:12px;color:var(--text-3)">
      <i class="ti ti-info-circle" style="font-size:13px"></i> Configure o Supabase Admin em <strong>admin_config.js</strong>
    </div>
  </div>
</div>

<!-- APP -->
<div id="adminApp" class="app" style="display:none">
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="sb-icon"><i class="ti ti-building-store"></i></div>
      <div>
        <div class="sb-title">GestãoOS</div>
        <div class="sb-sub">Admin Panel</div>
      </div>
    </div>
    <div class="sb-nav" id="sbNav"></div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">AD</div>
        <div>
          <div class="sb-uname" id="sbEmail">admin</div>
          <div class="sb-urole">Administrador</div>
        </div>
        <button class="btn btn-ghost" style="margin-left:auto;color:rgba(255,255,255,.4);padding:4px" onclick="doLogout()" title="Sair"><i class="ti ti-logout" style="font-size:16px"></i></button>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div style="font-size:16px;font-weight:600" id="tbTitle">Dashboard</div>
      <div class="tb-right">
        <div class="tb-search">
          <i class="ti ti-search"></i>
          <input type="text" placeholder="Buscar cliente..." id="searchInput" oninput="handleSearch(this.value)"/>
        </div>
        <button class="btn btn-primary" id="tbActionBtn" style="display:none" onclick="tbAction()">
          <i class="ti ti-plus" id="tbActionIcon"></i>
          <span id="tbActionLabel">Novo</span>
        </button>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<div id="toast-container"></div>
<div id="modal-root"></div>

<script>
// ═══════════════════════════════
// CONFIG — edite com suas credenciais
// ═══════════════════════════════
const ADMIN_CFG = {
  supabaseUrl: 'https://soujbtieenvhaatxvvnk.supabase.co',
  supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvdWpidGllZW52aGFhdHh2dm5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjIyNjcsImV4cCI6MjA5NDA5ODI2N30.D5e5DRuRl0PBQr9B7VuqnGU4O0-R63Cuv00Cz1Q5I-w',
};

// ═══════════════════════════════
// SUPABASE
// ═══════════════════════════════
let supa = null;
let USER = null;

async function initSupa() {
  if (!ADMIN_CFG.supabaseUrl || !ADMIN_CFG.supabaseKey) return false;
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    supa = createClient(ADMIN_CFG.supabaseUrl, ADMIN_CFG.supabaseKey);
    return true;
  } catch(e) { return false; }
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginError');
  err.style.display='none';
  if(!email||!pass){err.textContent='Preencha e-mail e senha';err.style.display='block';return;}
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader spin"></i> Entrando...';
  if(!supa){err.textContent='Configure as credenciais do Supabase em ADMIN_CFG';err.style.display='block';btn.disabled=false;btn.innerHTML='<i class="ti ti-lock"></i> Entrar no painel';return;}
  try {
    const {data,error} = await supa.auth.signInWithPassword({email,password:pass});
    if(error) throw error;
    USER = data.user;
    document.getElementById('sbEmail').textContent = USER.email;
    document.getElementById('sbAvatar').textContent = USER.email.slice(0,2).toUpperCase();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminApp').style.display='flex';
    nav('overview');
  } catch(e) {
    err.textContent = 'Credenciais inválidas. Verifique e-mail e senha.';
    err.style.display='block';
  }
  btn.disabled=false; btn.innerHTML='<i class="ti ti-lock"></i> Entrar no painel';
}

async function doLogout() {
  if(supa) await supa.auth.signOut();
  USER=null;
  document.getElementById('adminApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function toast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  const icons={success:'ti-check',error:'ti-x',warning:'ti-alert-triangle',info:'ti-info-circle'};
  el.className='toast toast-'+type;
  el.innerHTML=`<i class="ti ${icons[type]}" style="font-size:16px;flex-shrink:0"></i><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>{el.style.animation='slideOut .2s ease forwards';setTimeout(()=>el.remove(),200);},3000);
}

function openModal(html,opts={}){
  closeModal();
  const root=document.getElementById('modal-root');
  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='activeModal';
  ov.innerHTML=`<div class="modal${opts.lg?' modal-lg':''}">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  root.appendChild(ov);
  setTimeout(()=>{const f=ov.querySelector('input,select,textarea');if(f)f.focus();},50);
}
function closeModal(){const m=document.getElementById('activeModal');if(m)m.remove();}

function confirm2(msg,cb){
  openModal(`<div class="modal-header"><div class="modal-title">Confirmar</div></div>
    <div class="modal-body"><p style="font-size:14px;color:var(--text-2);line-height:1.6">${msg}</p></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="closeModal();(${cb.toString()})()">Confirmar</button></div>`);
}

function fmtDate(d){return d?d.slice(0,10).split('-').reverse().join('/'):'—';}
function fmt(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function avatarColor(n){const c=['#7c3aed','#2563EB','#16a34a','#dc2626','#d97706','#0891b2'];let h=0;for(const ch of(n||''))h=(h<<5)-h+ch.charCodeAt(0);return c[Math.abs(h)%c.length];}

let SEARCH='', PAGE='overview';
let DATA={clientes:[],planos:[],pagamentos:[],tickets:[]};

// ═══════════════════════════════
// NAVIGATION
// ═══════════════════════════════
const PAGES=[
  {id:'overview',   icon:'ti-layout-dashboard', label:'Dashboard',  group:'Principal'},
  {id:'clientes',   icon:'ti-users',             label:'Clientes',   group:'Principal'},
  {id:'planos',     icon:'ti-package',           label:'Planos',     group:'Principal'},
  {id:'pagamentos', icon:'ti-cash',              label:'Pagamentos', group:'Financeiro'},
  {id:'tickets',    icon:'ti-headset',           label:'Suporte',    group:'Financeiro'},
  {id:'config',     icon:'ti-settings',          label:'Configurações',group:'Sistema'},
];

function renderSidebar(){
  const groups={};
  PAGES.forEach(p=>{if(!groups[p.group])groups[p.group]=[];groups[p.group].push(p);});
  let html='';
  for(const[g,items]of Object.entries(groups)){
    html+=`<div class="sb-group">${g}</div>`;
    items.forEach(p=>{
      const badge=p.id==='tickets'?DATA.tickets.filter(t=>t.status==='aberto').length:p.id==='clientes'?DATA.clientes.filter(c=>c.status==='trial').length:0;

      supa.from('tickets').select('*,clientes(nome)').order('created_at',{ascending:false}).limit(100),
    ]);
    if(cl.data)DATA.clientes=cl.data;
    if(pl.data)DATA.planos=pl.data;

}

async function sincronizarClientes(){
  const btn=document.getElementById('btnSync');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader spin"></i> Sincronizando...';}
  try{
    // Busca novos cadastros do Banco 2
    const {createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const banco2=createClient(BANCO2.url,BANCO2.key);
    const{data:novos,error}=await banco2.from('novos_cadastros').select('*').eq('processado',false).order('created_at',{ascending:true});
    if(error)throw error;
    if(!novos||novos.length===0){toast('Nenhum cadastro novo para sincronizar','info');if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> Sincronizar clientes';}return;}

    // Busca plano Free no Banco 1
    const{data:planoFree}=await supa.from('planos').select('id').eq('nome','Free').single();
    let importados=0;

    for(const novo of novos){
      // Verifica se já existe
      const{data:existe}=await supa.from('clientes').select('id').eq('email',novo.email).maybeSingle();
      if(!existe){
        const trialAte=new Date();trialAte.setDate(trialAte.getDate()+14);
        const{error:insErr}=await supa.from('clientes').insert({
          nome:novo.nome||novo.email.split('@')[0],
          email:novo.email,
          plano_id:planoFree?.id??null,
          status:'trial',
          trial_ate:trialAte.toISOString().slice(0,10),
          observacoes:`Cadastro automático. User ID: ${novo.user_id}`,
          created_at:novo.created_at,
          updated_at:new Date().toISOString(),
        });
        if(!insErr)importados++;
      }
      // Marca como processado no Banco 2
      await banco2.from('novos_cadastros').update({processado:true}).eq('id',novo.id);
    }

    await loadAll();
    toast(`✓ ${importados} novo(s) cliente(s) importado(s)!`,'success');
    nav('overview');
  }catch(e){
    console.error('Sync error:',e);
    toast('Erro ao sincronizar: '+e.message,'error');
  }
  if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> Sincronizar clientes';}
}

    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarCliente('${editId||''}')"><i class="ti ti-check"></i> Salvar</button></div>`,{lg:false});
}

async function salvarCliente(editId){
  const nome=document.getElementById('cl_nome').value.trim();
  const email=document.getElementById('cl_email').value.trim();
  if(!nome||!email){toast('Preencha nome e e-mail','error');return;}
  const row={nome,email,empresa:document.getElementById('cl_empresa').value,telefone:document.getElementById('cl_tel').value,tipo_negocio:document.getElementById('cl_tipo').value,plano_id:document.getElementById('cl_plano').value||null,status:document.getElementById('cl_status').value,trial_ate:document.getElementById('cl_trial').value||null,observacoes:document.getElementById('cl_obs').value,updated_at:new Date().toISOString()};
  if(!supa){toast('Sem conexão com Supabase','error');return;}
  if(editId){
    const{error}=await supa.from('clientes').update(row).eq('id',editId);
    if(error){toast('Erro: '+error.message,'error');return;}
    Object.assign(DATA.clientes.find(c=>c.id===editId),row);
    toast('Cliente atualizado!');
  }else{
    const{data,error}=await supa.from('clientes').insert(row).select().single();
    if(error){toast('Erro: '+error.message,'error');return;}
    DATA.clientes.unshift(data);
    toast('Cliente cadastrado!');
  }
  closeModal();nav('clientes');
}

function verCliente(id){
  const c=DATA.clientes.find(x=>x.id===id);if(!c)return;
  const pgsCl=DATA.pagamentos.filter(p=>p.cliente_id===id);
  const tksCl=DATA.tickets.filter(t=>t.cliente_id===id);
  openModal(`
    <div class="modal-header"><div class="modal-title">Detalhes — ${c.nome}</div><button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="grid-2" style="margin-bottom:1rem">
        <div>
          <div class="text-xs text-3 mb-1">CONTATO</div>
          <div class="fw5">${c.nome}</div>
          <div class="text-sm text-2">${c.email}</div>
          <div class="text-sm text-2">${c.telefone||'—'}</div>
        </div>
        <div>
          <div class="text-xs text-3 mb-1">PLANO & STATUS</div>
          <span class="badge badge-purple">${c.planos?.nome||'—'}</span>
          <span class="status-dot ${c.status==='ativo'?'dot-green':c.status==='trial'?'dot-amber':'dot-red'}" style="margin-left:8px"></span>${c.status}
          ${c.trial_ate?`<div class="text-xs text-3" style="margin-top:4px">Trial até ${fmtDate(c.trial_ate)}</div>`:''}
        </div>
      </div>
      <div class="card-title mb-1">Pagamentos</div>
      ${pgsCl.length?pgsCl.slice(0,4).map(p=>`<div class="stat-row"><span>${p.referencia||'—'}</span><div><span class="badge ${p.status==='pago'?'badge-green':'badge-amber'}">${p.status}</span> <strong>${fmt(p.valor)}</strong></div></div>`).join(''):'<div class="text-sm text-3">Nenhum pagamento</div>'}
      <div class="card-title mb-1" style="margin-top:1rem">Tickets</div>
      ${tksCl.length?tksCl.slice(0,3).map(t=>`<div class="stat-row"><span>${t.assunto}</span><span class="badge ${t.status==='resolvido'?'badge-green':'badge-amber'}">${t.status}</span></div>`).join(''):'<div class="text-sm text-3">Nenhum ticket</div>'}
      ${c.observacoes?`<div class="card-title mb-1" style="margin-top:1rem">Observações</div><div class="text-sm text-2">${c.observacoes}</div>`:''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
      <button class="btn btn-primary" onclick="closeModal();modalCliente('${id}')"><i class="ti ti-edit"></i> Editar</button>
    </div>`,{lg:false});
}

async function deletarCliente(id){
  confirm2('Excluir este cliente permanentemente?',async()=>{
    const{error}=await supa.from('clientes').delete().eq('id',id);
    if(error){toast('Erro: '+error.message,'error');return;}
    DATA.clientes=DATA.clientes.filter(c=>c.id!==id);
    toast('Cliente removido');nav('clientes');
  });
}

// ═══════════════════════════════
// MODALS — PAGAMENTOS
// ═══════════════════════════════
function modalPagamento(editId){
  const p=editId?DATA.pagamentos.find(x=>x.id===editId):null;
  openModal(`
    <div class="modal-header"><div class="modal-title">${p?'Editar pagamento':'Novo pagamento'}</div><button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Cliente *</label>
          <select class="form-select" id="pg_cliente">
            ${DATA.clientes.map(c=>`<option value="${c.id}" ${p?.cliente_id===c.id?'selected':''}>${c.nome}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Referência</label><input type="text" class="form-input" id="pg_ref" value="${p?.referencia||''}" placeholder="Ex: Maio/2026"/></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Valor *</label><input type="number" class="form-input" id="pg_valor" value="${p?.valor||''}" min="0" step="0.01"/></div>
        <div class="form-group"><label class="form-label">Vencimento</label><input type="date" class="form-input" id="pg_venc" value="${p?.vencimento||''}"/></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Método</label>
          <select class="form-select" id="pg_metodo">
            ${['pix','cartao','boleto','transferencia','dinheiro'].map(m=>`<option ${p?.metodo===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="pg_status">
            ${['pendente','pago','atrasado','cancelado'].map(s=>`<option ${p?.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarPagamento('${editId||''}')"><i class="ti ti-check"></i> Salvar</button></div>`);
}

async function salvarPagamento(editId){
  const valor=parseFloat(document.getElementById('pg_valor').value)||0;
  if(!valor){toast('Informe o valor','error');return;}
  const row={cliente_id:document.getElementById('pg_cliente').value,referencia:document.getElementById('pg_ref').value,valor,vencimento:document.getElementById('pg_venc').value||null,metodo:document.getElementById('pg_metodo').value,status:document.getElementById('pg_status').value};
  if(!supa){toast('Sem conexão','error');return;}
  if(editId){
    const{error}=await supa.from('pagamentos').update(row).eq('id',editId);
    if(error){toast('Erro: '+error.message,'error');return;}
    Object.assign(DATA.pagamentos.find(p=>p.id===editId),row);toast('Atualizado!');
  }else{
    const{data,error}=await supa.from('pagamentos').insert(row).select('*,clientes(nome)').single();
    if(error){toast('Erro: '+error.message,'error');return;}
    DATA.pagamentos.unshift(data);toast('Pagamento registrado!');
  }
  closeModal();nav('pagamentos');
}

async function marcarPago(id){
  const{error}=await supa.from('pagamentos').update({status:'pago',pago_em:new Date().toISOString().slice(0,10)}).eq('id',id);
  if(error){toast('Erro','error');return;}
  const p=DATA.pagamentos.find(x=>x.id===id);if(p){p.status='pago';p.pago_em=new Date().toISOString().slice(0,10);}
  toast('Marcado como pago! 💰');nav('pagamentos');
}

async function deletarPagamento(id){
  confirm2('Excluir este pagamento?',async()=>{
    await supa.from('pagamentos').delete().eq('id',id);
    DATA.pagamentos=DATA.pagamentos.filter(p=>p.id!==id);
    toast('Removido');nav('pagamentos');
  });
}

// ═══════════════════════════════
// MODALS — TICKETS
// ═══════════════════════════════
function responderTicket(id){
  const t=DATA.tickets.find(x=>x.id===id);if(!t)return;
  openModal(`
    <div class="modal-header"><div class="modal-title">Ticket — ${t.assunto}</div><button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div style="background:var(--bg);border-radius:var(--radius);padding:.875rem 1rem;margin-bottom:1rem;font-size:13px">
        <div class="text-xs text-3 mb-1">MENSAGEM DO CLIENTE</div>
        <div>${t.mensagem||'(sem mensagem)'}</div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Status</label>
          <select class="form-select" id="tk_status">
            ${['aberto','em_atendimento','resolvido'].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Prioridade</label>
          <select class="form-select" id="tk_prior">
            ${['baixa','normal','alta','urgente'].map(s=>`<option ${t.prioridade===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Resposta</label><textarea class="form-textarea" id="tk_resp" placeholder="Sua resposta ao cliente...">${t.resposta||''}</textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarTicket('${id}')"><i class="ti ti-send"></i> Salvar resposta</button></div>`);
}

function modalTicket(){
  openModal(`
    <div class="modal-header"><div class="modal-title">Novo ticket</div><button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Cliente</label><select class="form-select" id="nt_cliente">${DATA.clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Prioridade</label><select class="form-select" id="nt_prior">${['baixa','normal','alta','urgente'].map(s=>`<option>${s}</option>`).join('')}</select></div>
      </div>
      <div class="form-group mb-2"><label class="form-label">Assunto *</label><input type="text" class="form-input" id="nt_assunto"/></div>
      <div class="form-group"><label class="form-label">Mensagem</label><textarea class="form-textarea" id="nt_msg"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="criarTicket()"><i class="ti ti-check"></i> Criar</button></div>`);
}

async function criarTicket(){
  const assunto=document.getElementById('nt_assunto').value.trim();
  if(!assunto){toast('Informe o assunto','error');return;}
  const row={cliente_id:document.getElementById('nt_cliente').value,assunto,mensagem:document.getElementById('nt_msg').value,prioridade:document.getElementById('nt_prior').value,status:'aberto'};
  const{data,error}=await supa.from('tickets').insert(row).select('*,clientes(nome)').single();
  if(error){toast('Erro: '+error.message,'error');return;}
  DATA.tickets.unshift(data);toast('Ticket criado!');closeModal();nav('tickets');
}

async function salvarTicket(id){
  const row={status:document.getElementById('tk_status').value,prioridade:document.getElementById('tk_prior').value,resposta:document.getElementById('tk_resp').value,respondido_em:new Date().toISOString()};
  const{error}=await supa.from('tickets').update(row).eq('id',id);
  if(error){toast('Erro: '+error.message,'error');return;}
  Object.assign(DATA.tickets.find(t=>t.id===id),row);
  toast('Resposta salva!');closeModal();nav('tickets');
}

async function deletarTicket(id){
  confirm2('Excluir este ticket?',async()=>{
    await supa.from('tickets').delete().eq('id',id);
    DATA.tickets=DATA.tickets.filter(t=>t.id!==id);
    toast('Removido');nav('tickets');
  });
}

// PLANO
function modalPlano(editId){
  const p=editId?DATA.planos.find(x=>x.id===editId):null;
  openModal(`
    <div class="modal-header"><div class="modal-title">${p?'Editar plano':'Novo plano'}</div><button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Nome *</label><input type="text" class="form-input" id="pl_nome" value="${p?.nome||''}"/></div>
        <div class="form-group"><label class="form-label">Preço mensal</label><input type="number" class="form-input" id="pl_preco" value="${p?.preco_mensal||0}" min="0" step="0.01"/></div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group"><label class="form-label">Limite estabelecimentos</label><input type="number" class="form-input" id="pl_ests" value="${p?.limite_estabelecimentos||1}" min="1"/></div>
        <div class="form-group"><label class="form-label">Limite usuários</label><input type="number" class="form-input" id="pl_users" value="${p?.limite_usuarios||1}" min="1"/></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarPlano('${editId||''}')"><i class="ti ti-check"></i> Salvar</button></div>`);
}

async function salvarPlano(editId){
  const nome=document.getElementById('pl_nome').value.trim();
  if(!nome){toast('Informe o nome','error');return;}
  const row={nome,preco_mensal:parseFloat(document.getElementById('pl_preco').value)||0,limite_estabelecimentos:parseInt(document.getElementById('pl_ests').value)||1,limite_usuarios:parseInt(document.getElementById('pl_users').value)||1};
  if(editId){
    await supa.from('planos').update(row).eq('id',editId);
    Object.assign(DATA.planos.find(p=>p.id===editId),row);toast('Plano atualizado!');
  }else{
    const{data}=await supa.from('planos').insert(row).select().single();
    if(data)DATA.planos.push(data);toast('Plano criado!');
  }
  closeModal();nav('planos');
}

async function reconectarAdmin(){
  ADMIN_CFG.supabaseUrl=document.getElementById('cfg_url').value;
  ADMIN_CFG.supabaseKey=document.getElementById('cfg_key').value;
  const ok=await initSupa();
  if(ok){await loadAll();toast('Reconectado!');nav('config');}
  else toast('Falha na conexão','error');
}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
async function start(){
  await initSupa();
  if(supa){
    // check session
    const{data:{session}}=await supa.auth.getSession();
    if(session){
      USER=session.user;
      document.getElementById('sbEmail').textContent=USER.email;
      document.getElementById('sbAvatar').textContent=USER.email.slice(0,2).toUpperCase();
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminApp').style.display='flex';
      await loadAll();
      nav('overview');
      return;
    }
  }
  // show login
  document.getElementById('loginScreen').style.display='flex';
}

start();
</script>
